services:
  - type: web
    name: campaign-monitoring-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: GOOGLE_ADS_MOCK_MODE
        value: "true"
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: GOOGLE_ADS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CAMPAIGN_FETCH_CRON
        value: "*/1 * * * *"
      - key: RULE_EVALUATION_CRON
        value: "*/1 * * * *"
      - key: DEFAULT_ALERT_COOLDOWN_MINUTES
        value: "15"
      - key: DEFAULT_SPEND_LIMIT
        value: "50"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALERT_HISTORY_RETENTION_DAYS
        value: "30"
      - key: METRICS_RETENTION_DAYS
        value: "30"
      - key: LANDING_CLICKS_RETENTION_DAYS
        value: "30"
      - key: GCLID_RETENTION_DAYS
        value: "180"

  - type: web
    name: campaign-monitoring-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_POLL_INTERVAL_MS
        value: "15000"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

name: Keep Backend Awake

# Render's free tier spins down the backend after ~15 minutes of no traffic,
# so the first request after that takes 30-60s to "wake up". This pings the
# health endpoint every 10 minutes - often enough that Render never sees it
# go idle, so real users never hit a cold start. Costs nothing: a single curl
# takes a couple of seconds, well within GitHub Actions' free minutes.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -fsS --max-time 30 https://campaign-monitoring-server.onrender.com/api/health
